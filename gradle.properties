# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/build_environment.html#sec:gradle_configuration_properties


# --- Daemon ---
# true is already the default. It is written explicitly because a configuration
# file that leaves critical behavior implicit is a file someone will have to
# reread and infer six months from now. Being explicit costs one line and
# removes one doubt.
org.gradle.daemon=true

# --- Parallel project execution ---
# This only makes sense for a multi-module project with genuinely independent
# modules. It does nothing on a single-module project, and on a multi-module
# project with tightly coupled dependencies it can introduce resource contention
# instead of speed. Check with --profile before keeping it enabled in CI.
org.gradle.parallel=true

# --- Build cache (execution) ---
# Reuses task outputs across different builds (including local <-> CI if the
# build cache is shared over HTTP). It should always be enabled, except in the
# rare case where the project's tasks are not cache-safe (inputs/outputs are not
# declared correctly): in that case the problem is in the build script, not in
# this property.
org.gradle.caching=true

# --- Configuration cache ---
# Skips the configuration phase when build scripts, settings, and relevant
# inputs have not changed. This keeps the property that was already present in
# the original file: correct, but not enough by itself. If the project uses
# plugins that are not yet compatible, the build fails (default behavior) until
# you fix the issue reported in the automatically generated HTML report.
# Do not silence issues with warning mode as a permanent solution: it is a
# workaround, not a fix.
org.gradle.configuration-cache=true

# --- Configure on demand ---
# Useful only on large multi-module projects (dozens of modules), where
# configuring only the required subprojects shortens the configuration phase.
# On small projects it is conceptual overhead without measurable benefit. Leave
# it disabled until the project is large enough to justify it, then measure
# before/after.
org.gradle.configureondemand=false

# --- Output console ---
# auto adapts the format (rich/plain) to the terminal invoking the build, so it
# behaves well both locally and in CI without needing two different
# configurations.
org.gradle.console=auto
